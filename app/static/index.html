<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;

/* ---------- theme ---------- */
const T = {
  bg:"#EAF6F5", surface:"#FFFFFF", ink:"#0A2E33", sub:"#5C7B7E",
  teal:"#0B6E78", tealDeep:"#085159", aqua:"#26C6BE", aquaSoft:"#D7F2EF",

};
const FONT = '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif';

/* ---------- inline icons ---------- */
function ic(children) {
  return ({ size = 24, color = "currentColor", strokeWidth = 2, style, className }) => (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color}
      strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style} className={className}>
      {children}

  );
}
const Droplets = ic(<path d="M12 2.5S6 9 6 13a6 6 0 0 0 12 0c0-4-6-10.5-6-10.5z" />);
const Waves = ic(<><path d="M2 8c2-2 4-2 6 0s4 2 6 0 4-2 6 0" /><path d="M2 13c2-2 4-2 6 0s4 2 6 0 4-2 6 0" /><path d="M2 18c2-2 4-2 6 0s4 2 6 0 4-2 6 0" /></>);
const Check = ic(<path d="M20 6 9 17l-5-5" />);
const Settings = ic(<><circle cx="12" cy="12" r="3" /><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2" /></>);
const Sparkles = ic(<path d="M12 3l1.8 4.2L18 9l-4.2 1.8L12 15l-1.8-4.2L6 9l4.2-1.8z" />);
const RefreshCw = ic(<><path d="M21 12a9 9 0 1 1-2.6-6.4" /><path d="M21 4v5h-5" /></>);
const Beaker = ic(<><path d="M9 3h6" /><path d="M10 3v6L5 19a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1l-5-10V3" /></>);
const History = ic(<><path d="M3 5v4h4" /><path d="M3.5 9a8 8 0 1 1-.5 4" /><path d="M12 8v4l3 2" /></>);
const AlertTriangle = ic(<><path d="M12 3 21 19H3z" /><path d="M12 10v4M12 17h.01" /></>);
const Gauge = ic(<><path d="M5 19a8 8 0 1 1 14 0" /><path d="M12 14l4-4" /></>);
const Sun = ic(<><circle cx="12" cy="12" r="4" /><path d="M12 4V2M12 22v-2M4 12H2M22 12h-2M6 6 4.5 4.5M19.5 19.5 18 18M18 6l1.5-1.5M4.5 19.5 6 18" /></>);
const MapPin = ic(<><path d="M12 22s7-7 7-12a7 7 0 1 0-14 0c0 5 7 12 7 12z" /><circle cx="12" cy="10" r="2.5" /></>);
const ChevronDown = ic(<path d="M6 9l6 6 6-6" />);
const Home = ic(<><path d="M3 11l9-8 9 8" /><path d="M5 10v10h14V10" /></>);
const MessageCircle = ic(<path d="M21 11.5a8.4 8.4 0 0 1-9 8.4 9 9 0 0 1-4-1L3 20l1.1-4.9A8.4 8.4 0 1 1 21 11.5z" />);

/* ---------- defaults ---------- */
const DEFAULT_CONFIG = {
  poolSize: 16000, pumpCap: 10000, lat: 55.4486, lng: 10.6622,
  locationName: "Kerteminde", useWaterfall: false, autoPlan: true,
  system: "oxygen", oxygenForm: "oxychock", uvLamp: false, filterType: "sand",
  rates: { oxyPer10k:40, oxyDailyPer10k:20, aktPer10k:25, klarStartPer10k:100, klarWeeklyPer10k:50, flokMinPer10k:50, flokMaxPer10k:100,
           phMinusPer10k:150, phPlusPer10k:100, metalMinMlPer10k:300, metalMaxMlPer10k:500, seaklearMlPer2000:25 },
};
const FREQ_LABEL = { daily:"Dagligt", every3:"Hver 3. dag", weekly:"Ugentligt", every14:"Hver 14. dag", monthly:"Månedligt", yearly:"Årligt" };
/* Frekvens → gruppe i "Skal gøres" */
const FREQ_BUCKET = { daily:"Dagligt", every3:"Dagligt", weekly:"Ugentligt", every14:"Ugentligt", monthly:"Månedligt", yearly:"Årligt" };
const BUCKET_ORDER = ["Dagligt","Ugentligt","Månedligt","Årligt"];
const READING_LABEL = { ph:"pH", oxy:"aktiv ilt", klor:"frit klor" };
const SYSTEMS = { oxygen:"Aktiv ilt", chlorine:"Klor" };
const FILTERS = { sand:"Sandfilter", glass:"Filterglas", cartridge:"Patronfilter", balls:"FilterBalls" };
const WEEKDAYS = ["Søndag","Mandag","Tirsdag","Onsdag","Torsdag","Fredag","Lørdag"];

/* Tjekliste afhænger af system / desinfektionsform / filtertype / UV */
function buildTasks(cfg, d){
  const t=[
    { id:"net", label:"Fjern blade & rens overflade", freq:"daily" },
    { id:"ph", label:"Mål pH (7,0–7,4)", freq:"daily" },
  ];
  if(cfg.system==="chlorine"){
    t.push({ id:"klor", label:"Tjek & justér klor (1–3 mg/l)", freq:"daily", dose:"hold 1–3 mg/l" });
  } else if(cfg.oxygenForm==="combitabs"){
    t.push({ id:"combitabs", label:"CombiTabs i skimmer/dispenser", freq:"daily", dose:`${d.combiTabs} stk` });
  } else {
    t.push({ id:"oxy", label:"OxyChock + Aktivator", freq:"every3", dose:`${d.oxy3} g + ${d.akt3} ml` });
  }
  t.push({ id:"klar", label:"KlarPool (algeforebyggelse)", freq:"weekly", dose:`${d.klarWeekly} ml` });
  const fb={ sand:"Returskyl sandfilter (backwash + rinse)", glass:"Returskyl filterglas (backwash + rinse)", cartridge:"Rens patronfilter", balls:"Returskyl FilterBalls (backwash + rinse)" }[cfg.filterType||"sand"];
  t.push({ id:"backwash", label:fb, freq:"weekly" });
  if((cfg.filterType||"sand")==="balls") t.push({ id:"ballsdeep", label:"Spul FilterBalls rene", freq:"monthly" });
  t.push({ id:"brush", label:"Børst siderne", freq:"weekly" });
  t.push({ id:"vacuum", label:"Støvsug bunden", freq:"weekly" });
  if(cfg.uvLamp) t.push({ id:"uvbulb", label:"Skift UV-pære", freq:"yearly" });
  return t;
}
function mainDisinfectId(cfg){ return cfg.system==="chlorine" ? "klor" : (cfg.oxygenForm==="combitabs" ? "combitabs" : "oxy"); }
function buildDoseRows(cfg, d){
  const rows=[];
  if(cfg.system==="chlorine"){
    rows.push(["Klor løbende","Hold 1–3 mg/l","doser følger"]);
    rows.push(["Klor-chok (grønt vand)","Efter behov","doser følger"]);
  } else if(cfg.oxygenForm==="combitabs"){
    rows.push(["CombiTabs","Dagligt (1 pr. 3000 L)",`${d.combiTabs} stk`]);
  } else {
    rows.push(["OxyChock + Aktivator","Hver 3. dag",`${d.oxy3} g + ${d.akt3} ml`]);
    rows.push(["OxyChock (alt. dagligt)","Dagligt",`${d.oxyDaily} g`]);
    rows.push(["OxyChock chok (grønt vand)","Efter behov",`${d.oxyProblem} g`]);
  }
  rows.push(["KlarPool","Ugentligt",`${d.klarWeekly} ml`]);
  rows.push(["FlokPool (uklart vand)","Efter behov",`${d.flokMin}–${d.flokMax} ml`]);
  rows.push(["SeaKlear","Ugentligt",`${d.seaklear} ml`]);
  rows.push(["pH-Minus","Sænker pH 0,2",`${d.phMinus} g`]);
  rows.push(["pH-Plus","Hæver pH 0,2",`${d.phPlus} g`]);
  rows.push(["Metal Out","Metaller/kobber",`${d.metalMin}–${d.metalMax} ml`]);
  if(cfg.system!=="chlorine") rows.push(["Sæsonstart","Opstart",`${d.oxyStart} g + ${d.aktStart} ml`]);
  return rows;
}

/* ---------- helpers ---------- */
const pad = n => String(n).padStart(2,"0");
const dateStr = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const today = () => dateStr(new Date());
const daysBetween = (a,b) => Math.round((new Date(b)-new Date(a))/86400000);
const r0 = n => Math.round(n);

function doses(cfg) {
  const f = cfg.poolSize/10000, x = cfg.rates;
  const uv = cfg.uvLamp ? 0.6 : 1;                 // UV reducerer løbende desinfektion (vejledende)
  const per2000 = cfg.poolSize/2000;
  return {
    f, uv: cfg.uvLamp===true,
    oxy3:r0(x.oxyPer10k*f*uv), oxyDaily:r0(x.oxyDailyPer10k*f*uv), akt3:r0(x.aktPer10k*f*uv),
    combiTabs:Math.max(1, Math.round(cfg.poolSize/3000*uv)),
    klarWeekly:r0(x.klarWeeklyPer10k*f), klarStart:r0(x.klarStartPer10k*f),
    flokMin:r0(x.flokMinPer10k*f), flokMax:r0(x.flokMaxPer10k*f),
    seaklear:r0((x.seaklearMlPer2000||25)*per2000),
    phMinus:r0((x.phMinusPer10k||150)*f), phPlus:r0((x.phPlusPer10k||100)*f),
    metalMin:r0((x.metalMinMlPer10k||300)*f), metalMax:r0((x.metalMaxMlPer10k||500)*f),
    oxyStart:r0(100*f), oxyProblem:r0(250*f), aktStart:r0(100*f),
  };
}
function pumpHours(t){ if(t==null)return 5; if(t<18)return 4; if(t<22)return 5; if(t<25)return 6; if(t<28)return 8; return 10; }
function wx(c){
  if(c===0)return{t:"Klart",e:"☀️"};
  if(c===1||c===2)return{t:"Let skyet",e:"🌤️"};
  if(c===3)return{t:"Overskyet",e:"☁️"};
  if(c===45||c===48)return{t:"Tåge",e:"🌫️"};
  if([51,53,55,56,57].includes(c))return{t:"Støvregn",e:"🌦️"};
  if([61,63,65,66,67].includes(c))return{t:"Regn",e:"🌧️"};
  if([71,73,75,77,85,86].includes(c))return{t:"Sne",e:"❄️"};
  if([80,81,82].includes(c))return{t:"Byger",e:"🌦️"};
  if([95,96,99].includes(c))return{t:"Torden",e:"⛈️"};
  return{t:"—",e:"🌡️"};
}
function lastDone(checks,id){ let b=null; for(const k of Object.keys(checks||{})){ if(k.endsWith("::"+id)){ const d=k.split("::")[0]; if(!b||d>b)b=d; } } return b; }
function isDue(checks,task){ const l=lastDone(checks,task.id); if(!l)return true; const g=daysBetween(l,today());
  if(task.freq==="daily")return g>=1; if(task.freq==="every3")return g>=3; if(task.freq==="weekly")return g>=7;
  if(task.freq==="every14")return g>=14; if(task.freq==="monthly")return g>=30; if(task.freq==="yearly")return g>=365; return true; }
/* Tilføj log-post, men slå identiske (samme person+label) sammen inden for 90 sek. */
function addLogEntry(log,entry){ const dup=(log||[]).some(e=>e.label===entry.label&&e.initials===entry.initials&&Math.abs(entry.ts-e.ts)<90000); return dup?(log||[]):[entry,...(log||[])].slice(0,60); }
function num(v){ const n=parseFloat(String(v==null?"":v).replace(",",".")); return isNaN(n)?null:n; }
/* Lokale doseringsforslag ud fra seneste måling og JERES satser (ingen AI). */
function measureSuggestions(cfg, readings, d){
  const out=[]; const r=readings||{};
  const ph=num(r.ph&&r.ph.value);
  if(ph!=null){
    if(ph>7.4){ const g=Math.max(1,Math.round(d.phMinus*(ph-7.2)/0.2)); out.push({kind:"warn",text:`pH er ${r.ph.value} (mål 7,0–7,4). For højt — tilsæt ca. ${g} g pH-Minus, kør pumpen, og mål igen efter et par timer.`}); }
    else if(ph<7.0){ const g=Math.max(1,Math.round(d.phPlus*(7.2-ph)/0.2)); out.push({kind:"warn",text:`pH er ${r.ph.value} (mål 7,0–7,4). For lavt — tilsæt ca. ${g} g pH-Plus, kør pumpen, og mål igen efter et par timer.`}); }
  }
  if(cfg.system!=="chlorine"){
    const ox=num(r.oxy&&r.oxy.value);
    if(ox!=null){ if(ox<3) out.push({kind:"warn",text:`Aktiv ilt er ${r.oxy.value} mg/l (mål 3–5). Lavt — giv en ekstra dosis OxyChock (~${d.oxyDaily} g) og kør pumpen længere i dag.`});
      else if(ox>5) out.push({kind:"info",text:`Aktiv ilt er ${r.oxy.value} mg/l (mål 3–5). Højt — vent med mere ilt, og mål igen i morgen.`}); }
  } else {
    const kl=num(r.klor&&r.klor.value);
    if(kl!=null){ if(kl<1) out.push({kind:"warn",text:`Frit klor er ${r.klor.value} mg/l (mål 1–3). Lavt — tilsæt klor efter etiket og mål igen.`});
      else if(kl>3) out.push({kind:"info",text:`Frit klor er ${r.klor.value} mg/l (mål 1–3). Højt — vent med mere, og bad først når det er faldet.`}); }
  }
  return out;
}

/* ---------- backend api ---------- */
async function apiGetState(){ try{ const r=await fetch("/api/state"); const j=await r.json(); return j && Object.keys(j).length?j:null; }catch{ return null; } }
async function apiPutState(s){ try{ await fetch("/api/state",{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(s)}); }catch(e){ console.error(e); } }

/* ===================================================================== */
function Poolvagten(){
  const [state,setState]=useState(null);
  const [me,setMe]=useState(()=>{ try{ return localStorage.getItem("pool:me")||""; }catch{ return ""; } });
  const [tab,setTab]=useState("home");
  const [weather,setWeather]=useState(null);
  const [wErr,setWErr]=useState(false);
  const [manualWx,setManualWx]=useState("normal");
  const [planLoading,setPlanLoading]=useState(false);
  const [planErr,setPlanErr]=useState(null);
  const [toast,setToast]=useState(null);
  const [chatBusy,setChatBusy]=useState(false);
  const stateRef=useRef(null); stateRef.current=state;
  const autoTriedRef=useRef(false);

  useEffect(()=>{ (async()=>{
    let s=await apiGetState();
    if(!s){ s={ config:DEFAULT_CONFIG, checks:{}, log:[], readings:{}, plan:null, profiles:[], followups:[], chat:[], updatedAt:Date.now() }; await apiPutState(s); }
    if(!s.config.rates)s.config.rates=DEFAULT_CONFIG.rates;
    s.config.rates={...DEFAULT_CONFIG.rates,...s.config.rates};   // flet nye satser ind i gammel state
    if(s.config.autoPlan===undefined)s.config.autoPlan=true;
    if(!s.config.system)s.config.system="oxygen";
    if(!s.config.oxygenForm)s.config.oxygenForm="oxychock";
    if(s.config.uvLamp===undefined)s.config.uvLamp=false;
    if(!s.config.filterType)s.config.filterType="sand";
    if(!s.profiles)s.profiles=[];
    if(!s.followups)s.followups=[];
    if(!s.chat)s.chat=[];
    setState(s);
  })(); },[]);

  useEffect(()=>{ const iv=setInterval(async()=>{ const r=await apiGetState(); const c=stateRef.current; if(r&&c&&r.updatedAt>(c.updatedAt||0))setState(r); },20000); return ()=>clearInterval(iv); },[]);

  const cfg=state?.config;
  useEffect(()=>{ if(!cfg)return; let dead=false; (async()=>{ try{
    const r=await fetch(`/api/weather?lat=${cfg.lat}&lng=${cfg.lng}`); if(!r.ok)throw 0;
    const d=await r.json(); if(!dead){ setWeather(d.daily); setWErr(false); }
  }catch{ if(!dead)setWErr(true); } })(); return ()=>{dead=true;}; },[cfg?.lat,cfg?.lng]);

  const showToast=m=>{ setToast(m); setTimeout(()=>setToast(null),2200); };
  const mutate=useCallback(async fn=>{ const cur=stateRef.current; const next={...fn(cur),updatedAt:Date.now()}; setState(next); await apiPutState(next); },[]);
  const saveMe=v=>{ const u=(v||"").toUpperCase().slice(0,4).trim(); setMe(u); try{ localStorage.setItem("pool:me",u); }catch{} };
  const addProfile=(name,initials)=>{ const p={id:Math.random().toString(36).slice(2),name:(name||"").trim(),initials:(initials||"").toUpperCase().slice(0,4).trim()}; if(!p.initials)return; mutate(s=>({...s,profiles:[...(s.profiles||[]),p]})); saveMe(p.initials); };
  const removeProfile=id=>mutate(s=>({...s,profiles:(s.profiles||[]).filter(p=>p.id!==id)}));
  const deleteLog=id=>mutate(s=>({...s,log:(s.log||[]).filter(e=>e.id!==id)}));

  const toggleTask=(taskId,label)=>{ if(!me){ showToast("Vælg en profil først"); return; }
    const key=`${today()}::${taskId}`;
    mutate(s=>{ const checks={...s.checks};
      if(checks[key]){ delete checks[key]; return {...s,checks}; }
      checks[key]={initials:me,ts:Date.now()};
      const entry={id:Math.random().toString(36).slice(2),ts:Date.now(),label,initials:me};
      return {...s,checks,log:addLogEntry(s.log,entry)};
    });
  };
  const saveReading=(kind,value)=>{ if(!value)return; if(!me){ showToast("Vælg en profil først"); return; }
    mutate(s=>{ const readings={...s.readings,[kind]:{value,ts:Date.now(),initials:me}};
      const entry={id:Math.random().toString(36).slice(2),ts:Date.now(),label:`Målte ${READING_LABEL[kind]||kind}: ${value}${kind!=="ph"?" mg/l":""}`,initials:me};
      return {...s,readings,log:addLogEntry(s.log,entry)};
    });
    showToast("Måling gemt");
  };
  const logExtra=(name,amount)=>{ if(!me){ showToast("Vælg en profil først"); return; }
    const due=new Date(); due.setDate(due.getDate()+2); const dueDate=dateStr(due);
    mutate(s=>{ const entry={id:Math.random().toString(36).slice(2),ts:Date.now(),label:`Ekstra dosis: ${name}${amount?` · ${amount}`:""}`,initials:me,extra:{name,amount}};
      const fu={id:Math.random().toString(36).slice(2),name,ts:Date.now(),due:dueDate};
      return {...s,log:addLogEntry(s.log,entry),followups:[fu,...(s.followups||[])].slice(0,40)};
    });
    showToast("Registreret — jeg spørger til vandet om 2 dage");
  };
  const answerFollowup=(name,better)=>{
    mutate(s=>{ const entry={id:Math.random().toString(36).slice(2),ts:Date.now(),label:`Opfølgning: ${name} — vandet er ${better?"blevet bedre":"ikke bedre endnu"}`,initials:me||"",followup:{name,better}};
      return {...s,log:addLogEntry(s.log,entry),followups:(s.followups||[]).filter(f=>!(f.name===name&&f.due<=today()))};
    });
    showToast("Tak — noteret");
  };
  const sendChat=async(text)=>{ const q=(text||"").trim(); if(!q||chatBusy)return;
    const prev=(stateRef.current.chat||[]);
    const userMsg={role:"user",content:q,ts:Date.now(),initials:me||""};
    const history=[...prev,userMsg].map(m=>({role:m.role,content:m.content}));
    await mutate(s=>({...s,chat:[...(s.chat||[]),userMsg].slice(-60)}));
    setChatBusy(true);
    try{
      const r=await fetch("/api/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({system:buildChatSystem(),messages:history})});
      if(!r.ok)throw 0; const data=await r.json();
      const asMsg={role:"assistant",content:(data.text||"").trim()||"(tomt svar)",ts:Date.now()};
      await mutate(s=>({...s,chat:[...(s.chat||[]),asMsg].slice(-60)}));
    }catch(e){ console.error(e); showToast("Kunne ikke få svar lige nu — prøv igen"); }
    finally{ setChatBusy(false); }
  };
  const buildChatSystem=()=>{
    const dd=doses(cfg); const r=state.readings||{};
    const sysName=cfg.system==="chlorine"?"klor":("aktiv ilt"+(cfg.oxygenForm==="combitabs"?" (CombiTabs)":""));
    const rd=[]; if(r.ph)rd.push(`pH ${r.ph.value}`); if(r.oxy)rd.push(`aktiv ilt ${r.oxy.value} mg/l`); if(r.klor)rd.push(`frit klor ${r.klor.value} mg/l`);
    const recent=(state.log||[]).slice(0,8).map(e=>`${dateStr(new Date(e.ts))} ${e.label}`).join("; ");
    const tmax=weather?.temperature_2m_max?.[0];
    return `Du er en hjælpsom dansk pool-ekspert for en husstand. Svar kort, konkret og venligt på dansk. Brug KUN doseringssatserne og retningslinjerne nedenfor — find ikke på andre tal. Mangler du en måling for at svare, så bed dem måle.
POOL: ${cfg.poolSize} L, ${sysName}-system, filter: ${FILTERS[cfg.filterType]||cfg.filterType}, ${cfg.uvLamp?"UV-lys aktivt, ":""}vandfald: ${cfg.useWaterfall?"ja":"nej"}, lokation ${cfg.locationName}.
MÅL: pH 7,0–7,4 (ideal 7,2)${cfg.system==="chlorine"?", frit klor 1–3 mg/l, cyanursyre under 80 ppm":", aktiv ilt 3–5 mg/l"}.
SATSER (skaleret til poolen): OxyChock ${dd.oxy3} g + Aktivator ${dd.akt3} ml hver 3. dag; OxyChock dagligt alt. ${dd.oxyDaily} g; OxyChock chok ${dd.oxyProblem} g; pH-Minus ${dd.phMinus} g sænker pH 0,2; pH-Plus ${dd.phPlus} g hæver pH 0,2; KlarPool ${dd.klarWeekly} ml/uge; FlokPool ${dd.flokMin}–${dd.flokMax} ml; SeaKlear ${dd.seaklear} ml/uge; opstart ${dd.oxyStart} g + ${dd.aktStart} ml.
SENESTE MÅLINGER: ${rd.join(", ")||"ingen"}. ${tmax!=null?`Vejr i dag ca. ${Math.round(tmax)}°C.`:""}
SENESTE LOG: ${recent||"ingen"}.
Ved problemer (grønt/mælkehvidt/tåget vand) foreslå konkrete trin med de rigtige doser herfra og husk pH først.`;
  };

  const generatePlan=async()=>{ if(!state)return; setPlanErr(null); setPlanLoading(true);
    try{
      const d=doses(cfg);
      const mainId=mainDisinfectId(cfg);
      const lastMain=lastDone(state.checks,mainId)||"ukendt";
      const sysName = cfg.system==="chlorine"
        ? "et KLOR-baseret system"
        : (cfg.oxygenForm==="combitabs" ? "et KLORFRIT aktiv ilt-system med CombiTabs (Swim & Fun)" : "et KLORFRIT aktiv ilt-system (Swim & Fun OxyChock + Aktivator)");
      const doseLine = cfg.system==="chlorine"
        ? `Hold frit klor 1–3 mg/l (præcise klordoser er ikke konfigureret endnu — anbefal måling og justering, ikke faste gram). KlarPool ${d.klarWeekly} ml ugentligt. Mål: pH 7,0–7,4, frit klor 1–3 mg/l, cyanursyre under 80 ppm.`
        : (cfg.oxygenForm==="combitabs"
            ? `CombiTabs ${d.combiTabs} stk dagligt (1 pr. 3000 L). KlarPool ${d.klarWeekly} ml ugentligt. Mål: pH 7,0–7,4, aktiv ilt 3–5 mg/l.`
            : `OxyChock ${d.oxy3} g + Aktivator ${d.akt3} ml hver 3. dag. KlarPool ${d.klarWeekly} ml ugentligt. Mål: pH 7,0–7,4, aktiv ilt 3–5 mg/l.`);
      const uvLine = cfg.uvLamp ? "UV-LYS aktivt: kemiforbruget er reduceret (~40%), men mål stadig jævnligt; UV virker kun mens pumpen kører, så prioritér pumpetid. Mind om årligt pæreskift ved sæsonstart.\n" : "";
      const filterName = ({sand:"sandfilter",glass:"filterglas",cartridge:"patronfilter",balls:"FilterBalls"})[cfg.filterType||"sand"];
      let wxLines="";
      const recentExtras=(state.log||[]).filter(e=>e.extra && (Date.now()-e.ts)<4*86400000);
      let extraLines=""; if(recentExtras.length){ extraLines="EKSTRA DOSER GIVET FOR NYLIG (ud over de faste):\n"+recentExtras.map(e=>`- ${dateStr(new Date(e.ts))}: ${e.extra.name}${e.extra.amount?` (${e.extra.amount})`:""}`).join("\n")+"\n"; }
      const recentFu=(state.log||[]).filter(e=>e.followup && (Date.now()-e.ts)<6*86400000);
      let fuLines=""; if(recentFu.length){ fuLines="OPFØLGNING PÅ TIDLIGERE BEHANDLINGER:\n"+recentFu.map(e=>`- ${dateStr(new Date(e.ts))}: ${e.followup.name} → ${e.followup.better?"vandet blev bedre":"INGEN bedring endnu"}`).join("\n")+"\n"; }
      if(weather&&weather.time){ for(let i=0;i<weather.time.length;i++){ const w=wx(weather.weather_code[i]);
        wxLines+=`- ${weather.time[i]} (${WEEKDAYS[new Date(weather.time[i]).getDay()]}): ${Math.round(weather.temperature_2m_max[i])}°C max, ${weather.precipitation_sum[i]} mm nedbør, ${w.t}\n`; } }
      else { const m={normal:"under 22°C, tørt",hot:"over 22°C, varmt",rain:"regn"}[manualWx]; wxLines=`- ${today()}: ${m} (manuelt valgt)\n`; }
      const prompt=`Du er en erfaren dansk pool-tekniker. Lav en kort, konkret vedligeholdelsesplan for de næste dage for ${sysName}.

POOL: ${cfg.poolSize} liter. Pumpe ${cfg.pumpCap} l/t. Filtertype: ${filterName}. Lokation ${cfg.locationName}. Vandfald/dykpumpe i brug: ${cfg.useWaterfall?"JA":"nej"}.
FASTE DOSER: ${doseLine}
${uvLine}SIDST GIVET HOVEDDESINFEKTION: ${lastMain}.
${extraLines}${fuLines}VEJRUDSIGT:
${wxLines}
Returnér KUN gyldig JSON, ingen markdown, ingen tekst udenom, præcis dette format:
{"days":[{"date":"YYYY-MM-DD","weekday":"Tirsdag","weather":"24° klart","headline":"kort, maks 6 ord","actions":["punkt med dosis hvor relevant"],"tip":"én kort sætning","alert":"kort advarsel eller null"}]}

REGLER:
- Beregn selv hvilke dage hoveddesinfektion skal gives ud fra "sidst givet" og intervallet (aktiv ilt OxyChock = hver 3. dag; CombiTabs og klor = dagligt tilsyn).
- temp > 22°C: anbefal hyppigere måling, evt. ekstra dosis og flere pumpetimer.
- nedbør > 3 mm: mind om pH-tjek efter regn.
- vandfald JA: mind om at pH stiger, hav pH-Minus klar.${cfg.uvLamp?"\n- UV aktivt: hold doser i den lave ende, men mål for at bekræfte.":""}
- Hvis der er givet ekstra doser for nylig (se ovenfor): tag højde for det — anbefal ikke at gentage en chokbehandling samme dag, og nævn kort relevant opfølgning (fx mål dagen efter et chok).
- Hvis en opfølgning viser INGEN bedring: foreslå næste skridt (fx flokning efter KlarPool, justér pH, eller et chok) i stedet for at gentage det samme.
- 1–4 actions pr. dag. Dansk, venligt, kort. Sæt alert til null hvis intet særligt.`;
      const r=await fetch("/api/plan",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt})});
      const data=await r.json(); const clean=(data.text||"").replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(clean);
      mutate(s=>({...s,plan:{generatedAt:Date.now(),days:parsed.days||[]}}));
    }catch(e){ console.error(e); setPlanErr("Kunne ikke hente planen lige nu. Prøv igen om lidt."); }
    finally{ setPlanLoading(false); }
  };

  useEffect(()=>{ if(!state||!cfg||!cfg.autoPlan||autoTriedRef.current||planLoading)return;
    const fresh=state.plan&&dateStr(new Date(state.plan.generatedAt))===today();
    if(fresh){ autoTriedRef.current=true; return; }
    if(!weather&&!wErr)return; autoTriedRef.current=true; generatePlan();
  },[state,weather,wErr,planLoading]);

  if(!state) return <div style={{fontFamily:FONT,background:T.bg,minHeight:"100vh",display:"grid",placeItems:"center",color:T.sub}}>
    <div style={{display:"flex",alignItems:"center",gap:10}}><Droplets size={20} color={T.teal}/> Indlæser Poolvagten…</div></div>;

  const d=doses(cfg);
  const tmax=weather?.temperature_2m_max?.[0];
  const precip=weather?.precipitation_sum?.[0];
  const wToday=weather?wx(weather.weather_code[0]):null;
  const hot=tmax!=null?tmax>=22:manualWx==="hot";
  const rain=precip!=null?precip>=3:manualWx==="rain";
  const hours=pumpHours(tmax)+(cfg.uvLamp?2:0);

  const alerts=[];
  if(hot)alerts.push({kind:"warn",icon:Sun,text:"Varmt vejr — alger og bakterier trives. Mål desinfektion før badning, og overvej en ekstra dosis i dag."});
  if(rain)alerts.push({kind:"info",icon:Droplets,text:"Regn i dag — regnvand skubber ofte pH. Tjek pH efter skybruddet."});
  if(cfg.useWaterfall)alerts.push({kind:"warn",icon:Waves,text:"Vandfald aktivt — luftningen hæver pH. Mål pH ekstra ofte og hav pH-Minus klar."});
  if(cfg.uvLamp)alerts.push({kind:"info",icon:Sun,text:"UV-lys aktivt — kemiforbruget er sat ned, men mål stadig jævnligt. UV virker kun mens pumpen kører; skift pæren årligt."});
  measureSuggestions(cfg,state.readings,d).forEach(m=>alerts.push({kind:m.kind,icon:Beaker,text:m.text}));
  const tasks=buildTasks(cfg,d);
  const dueFu=[]; { const seen={}; for(const f of (state.followups||[])){ if(f.due<=today()&&!seen[f.name]){ seen[f.name]=1; dueFu.push(f); } } }

  return (
    <div style={{fontFamily:FONT,background:T.bg,color:T.ink,minHeight:"100vh"}}>
      <div style={{maxWidth:540,margin:"0 auto",padding:"0 14px 96px"}}>
        <header style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 2px 14px"}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:38,height:38,borderRadius:11,background:T.teal,display:"grid",placeItems:"center",boxShadow:`0 4px 12px ${T.aquaSoft}`}}><Waves size={20} color="#fff"/></div>
            <div>
              <div style={{fontSize:19,fontWeight:800,letterSpacing:-0.4,lineHeight:1}}>Poolvagten</div>
              <div style={{fontSize:12,color:T.sub,display:"flex",alignItems:"center",gap:3,marginTop:3}}><MapPin size={11}/> {cfg.locationName}</div>
            </div>
          </div>
          <ProfilePicker profiles={state.profiles||[]} me={me} onSelect={saveMe} onAdd={addProfile} onRemove={removeProfile}/>
        </header>

        {tab==="home" && <>
          <section style={{...card,padding:0,overflow:"hidden",position:"relative",background:T.tealDeep}}>
            <div style={{padding:"16px 18px 26px",color:"#fff",position:"relative",zIndex:2}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{...eyebrow,color:T.aqua}}>I dag · {WEEKDAYS[new Date().getDay()]}</div>
                  <div style={{fontSize:15,opacity:.9,marginTop:2}}>{wToday?`${wToday.e} ${wToday.t}`:"Vejr ikke hentet"}{tmax!=null&&<span style={{fontWeight:700}}>{" · "}{Math.round(tmax)}°</span>}</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{...eyebrow,color:T.aqua}}>Pumpetid</div>
                  <div style={{fontSize:30,fontWeight:800,lineHeight:1,letterSpacing:-1}}>{hours}<span style={{fontSize:14,fontWeight:600}}> t</span></div>
                </div>
              </div>
              {wErr && <div style={{marginTop:12,display:"flex",gap:6,flexWrap:"wrap"}}>
                {[["normal","Normalt"],["hot","Varmt >22°"],["rain","Regn"]].map(([v,l])=>(
                  <button key={v} className="pv-btn" onClick={()=>setManualWx(v)} style={{...miniPill,background:manualWx===v?T.aqua:"rgba(255,255,255,.14)",color:manualWx===v?T.ink:"#fff"}}>{l}</button>
                ))}
              </div>}
            </div>
            <div style={{position:"absolute",bottom:-2,left:0,right:0,height:46,zIndex:1,opacity:.5}}>
              <svg className="pv-wave" viewBox="0 0 1200 60" preserveAspectRatio="none" style={{width:"200%",height:"100%"}}>
                <path d="M0,30 C150,55 300,5 600,30 C900,55 1050,5 1200,30 L1200,60 L0,60 Z" fill={T.aqua}/>
              </svg>
            </div>
          </section>

          {alerts.map((a,i)=><Alert key={i} kind={a.kind} icon={a.icon} text={a.text}/>)}

          {dueFu.map(f=>(
            <section key={f.id} style={{...card,background:T.infoBg,border:"none",padding:"13px 15px",marginTop:10}}>
              <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                <Beaker size={18} color={T.info} style={{flexShrink:0,marginTop:1}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:13.5,fontWeight:600,color:T.info,lineHeight:1.45}}>Blev vandet bedre efter <b>{f.name}</b>?</div>
                  <div style={{display:"flex",gap:8,marginTop:10}}>
                    <button className="pv-btn" onClick={()=>answerFollowup(f.name,true)} style={{...miniPill,background:T.ok,color:"#fff"}}>Ja, bedre</button>
                    <button className="pv-btn" onClick={()=>answerFollowup(f.name,false)} style={{...miniPill,background:"#fff",color:T.danger,border:`1.5px solid ${T.dangerBg}`}}>Nej, ikke endnu</button>
                  </div>
                </div>
              </div>
            </section>
          ))}

          <SectionTitle icon={Check} title="Skal gøres"/>
          <section style={{...card,padding:8}}>
            {BUCKET_ORDER.map(bk=>{ const items=tasks.filter(t=>FREQ_BUCKET[t.freq]===bk); if(!items.length)return null;
              return <div key={bk} style={{marginBottom:6}}>
                <div style={{...eyebrow,color:T.sub,padding:"8px 8px 4px"}}>{bk}</div>
                {items.map(task=>{ const done=!!state.checks[`${today()}::${task.id}`]; const due=isDue(state.checks,task); const last=lastDone(state.checks,task.id);
                  return <TaskRow key={task.id} task={task} done={done} due={due} dose={task.dose||null} last={last} stamp={done?state.checks[`${today()}::${task.id}`]:null} onToggle={()=>toggleTask(task.id,task.label)}/>;
                })}
              </div>;
            })}
          </section>

          <SectionTitle icon={Beaker} title="Hurtige målinger"/>
          <section style={{...card,display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Reading label="pH" hint="7,0 – 7,4" placeholder="7,2" last={state.readings?.ph} onSave={v=>saveReading("ph",v)}/>
            {cfg.system==="chlorine"
              ? <Reading label="Frit klor" hint="1 – 3 mg/l" placeholder="2" last={state.readings?.klor} onSave={v=>saveReading("klor",v)}/>
              : <Reading label="Aktiv ilt" hint="3 – 5 mg/l" placeholder="4" last={state.readings?.oxy} onSave={v=>saveReading("oxy",v)}/>}
          </section>

          <SectionTitle icon={Gauge} title={`Dine doser · ${cfg.poolSize.toLocaleString("da-DK")} L${d.uv?" · UV":""}`}/>
          <section style={{...card,padding:0,overflow:"hidden"}}>
            {buildDoseRows(cfg,d).map((r,i,arr)=><DoseRow key={r[0]} a={r[0]} b={r[1]} c={r[2]} onLog={logExtra} last={i===arr.length-1}/>)}
          </section>
          <p style={{fontSize:11.5,color:T.sub,margin:"10px 4px 0",lineHeight:1.5}}>{d.uv?"UV-lys reducerer de løbende desinfektionsdoser (vejledende) — mål altid med strips for at bekræfte. ":""}Tryk <b>+ Givet</b> for at registrere en ekstra dosis — den havner i loggen og tages med i næste plan. Opløs altid granulat i en spand vand først og hæld langs kanten. Justér pH før flokning. Brug dunkens låg som målebæger.</p>
        </>}

        {tab==="plan" && <PlanView state={state} planLoading={planLoading} planErr={planErr} onGenerate={generatePlan}/>}
        {tab==="log" && <LogView log={state.log||[]} onDelete={deleteLog}/>}
        {tab==="chat" && <ChatView chat={state.chat||[]} onSend={sendChat} busy={chatBusy} onClear={()=>mutate(s=>({...s,chat:[]}))}/>}
        {tab==="settings" && <SettingsView cfg={cfg} onSave={c=>mutate(s=>({...s,config:c}))} showToast={showToast}
          onReset={()=>mutate(s=>({...s,checks:{},log:[],readings:{},plan:null}))}/>}
      </div>

      <nav style={navBar}>
        {[["home",Home,"I dag"],["plan",Sparkles,"Plan"],["chat",MessageCircle,"Spørg"],["log",History,"Log"],["settings",Settings,"Indstil."]].map(([id,Icon,label])=>(
          <button key={id} className="pv-btn" onClick={()=>setTab(id)} style={{...navItem,color:tab===id?T.teal:T.sub}}>
            <Icon size={20} strokeWidth={tab===id?2.6:2}/><span style={{fontSize:11,fontWeight:tab===id?700:500}}>{label}</span>
          </button>
        ))}
      </nav>

      {toast && <div style={{position:"fixed",bottom:84,left:"50%",transform:"translateX(-50%)",background:T.ink,color:"#fff",padding:"9px 16px",borderRadius:999,fontSize:13,fontWeight:600,zIndex:50,boxShadow:"0 8px 24px rgba(0,0,0,.2)"}}>{toast}</div>}
    </div>
  );
}

/* ---------- subcomponents ---------- */
function ProfilePicker({profiles,me,onSelect,onAdd,onRemove}){
  const [open,setOpen]=useState(false); const [adding,setAdding]=useState(false);
  const [name,setName]=useState(""); const [ini,setIni]=useState("");
  const cur=profiles.find(p=>p.initials===me);
  return (
    <div style={{position:"relative"}}>
      <button className="pv-btn" onClick={()=>setOpen(o=>!o)} style={{...chip,background:me?T.teal:T.surface,color:me?"#fff":T.sub,borderColor:me?T.teal:T.line,display:"flex",alignItems:"center",gap:6}}>
        {me?(cur?cur.initials:me):"Vælg profil"}<ChevronDown size={14}/>
      </button>
      {open && <>
        <div onClick={()=>{setOpen(false);setAdding(false);}} style={{position:"fixed",inset:0,zIndex:30}}/>
        <div style={{position:"absolute",right:0,top:"calc(100% + 6px)",background:T.surface,border:`1px solid ${T.line}`,borderRadius:12,boxShadow:"0 12px 32px rgba(10,46,51,.16)",padding:6,minWidth:200,zIndex:31}}>
          {profiles.length===0&&!adding&&<div style={{fontSize:12.5,color:T.sub,padding:"8px 10px"}}>Ingen profiler endnu</div>}
          {profiles.map(p=>(
            <div key={p.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 8px",borderRadius:9,background:p.initials===me?T.aquaSoft:"transparent"}}>
              <div style={{width:28,height:28,borderRadius:8,background:T.teal,color:"#fff",display:"grid",placeItems:"center",fontSize:11.5,fontWeight:800,flexShrink:0}}>{p.initials}</div>
              <button className="pv-btn" onClick={()=>{onSelect(p.initials);setOpen(false);}} style={{flex:1,textAlign:"left",background:"none",border:"none",cursor:"pointer",fontFamily:FONT,fontSize:13.5,fontWeight:600,color:T.ink,minWidth:0}}>{p.name||p.initials}</button>
              <button className="pv-btn" onClick={()=>onRemove(p.id)} title="Fjern" style={{background:"none",border:"none",cursor:"pointer",color:T.sub,fontSize:18,lineHeight:1,padding:"0 5px"}}>×</button>
            </div>
          ))}
          {adding ? (
            <div style={{padding:"8px 6px 4px",borderTop:profiles.length?`1px solid ${T.line}`:"none",marginTop:profiles.length?4:0}}>
              <input className="pv-in" autoFocus value={name} onChange={e=>setName(e.target.value)} placeholder="Navn (fx Mor)" style={{width:"100%",boxSizing:"border-box",padding:"8px 9px",border:`1.5px solid ${T.line}`,borderRadius:8,fontSize:13.5,fontFamily:FONT,marginBottom:6}}/>
              <div style={{display:"flex",gap:6}}>
                <input className="pv-in" value={ini} maxLength={4} onChange={e=>setIni(e.target.value.toUpperCase())} placeholder="DK" style={{width:58,boxSizing:"border-box",padding:"8px 9px",border:`1.5px solid ${T.line}`,borderRadius:8,fontSize:13.5,fontWeight:700,textAlign:"center",fontFamily:FONT}}/>
                <button className="pv-btn" onClick={()=>{ if(ini.trim()){ onAdd(name,ini); setName("");setIni("");setAdding(false);setOpen(false); } }} style={{flex:1,background:T.teal,color:"#fff",border:"none",borderRadius:8,padding:"8px",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:FONT}}>Tilføj</button>
              </div>
            </div>
          ) : (
            <button className="pv-btn" onClick={()=>setAdding(true)} style={{width:"100%",textAlign:"left",background:"none",border:"none",borderTop:profiles.length?`1px solid ${T.line}`:"none",marginTop:profiles.length?4:0,padding:"9px 10px",cursor:"pointer",fontFamily:FONT,fontSize:13,fontWeight:700,color:T.teal}}>+ Tilføj profil</button>
          )}
        </div>
      </>}
    </div>
  );
}

}
function DoseRow({a,b,c,last,onLog}){ return <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",borderBottom:last?"none":`1px solid ${T.line}`}}>
  <div style={{flex:1,minWidth:0}}><div style={{fontSize:13.5,fontWeight:600}}>{a}</div><div style={{fontSize:11.5,color:T.sub}}>{b}</div></div>
  <div style={{fontSize:14,fontWeight:800,color:T.teal,whiteSpace:"nowrap"}}>{c}</div>
  {onLog&&<button className="pv-btn" onClick={()=>onLog(a,c)} title="Registrér som givet i dag" style={{...miniPill,background:T.aquaSoft,color:T.teal,flexShrink:0}}>+ Givet</button>}</div>; }
function PlanView({state,planLoading,planErr,onGenerate}){ const plan=state.plan;
  return <>
    <SectionTitle icon={Sparkles} title="Plan for de næste dage"/>
    <section style={{...card,textAlign:"center",padding:"16px 16px 18px"}}>
      <p style={{fontSize:13,color:T.sub,margin:"0 0 14px",lineHeight:1.5}}>Claude lægger en plan ud fra vejrudsigten, dine doser og hvornår du sidst gav OxyChock. Den opdaterer automatisk hver morgen — eller tryk her.</p>
      <button className="pv-btn" onClick={onGenerate} disabled={planLoading} style={{background:T.teal,color:"#fff",border:"none",borderRadius:11,padding:"11px 18px",fontWeight:700,fontSize:14,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:8,fontFamily:FONT,opacity:planLoading?.7:1}}>
        {planLoading?<RefreshCw size={16} className="pv-wave"/>:<Sparkles size={16}/>}{planLoading?"Lægger plan…":plan?"Opdatér plan":"Generér plan"}
      </button>
      {plan&&<div style={{fontSize:11,color:T.sub,marginTop:10}}>Senest opdateret {timeAgo(plan.generatedAt)}</div>}
      {planErr&&<div style={{fontSize:12.5,color:T.danger,marginTop:12}}>{planErr}</div>}
    </section>
    {plan?.days?.map((day,i)=>(
      <section key={i} style={{...card,padding:"14px 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
          <div style={{fontSize:15,fontWeight:800}}>{day.weekday}</div><div style={{fontSize:12.5,color:T.sub}}>{day.weather}</div>
        </div>
        {day.headline&&<div style={{fontSize:13.5,fontWeight:600,color:T.teal,margin:"4px 0 8px"}}>{day.headline}</div>}
        {day.alert&&<div style={{background:T.warnBg,color:T.warn,fontSize:12.5,padding:"8px 10px",borderRadius:9,marginBottom:8,display:"flex",gap:7}}><AlertTriangle size={15} style={{flexShrink:0,marginTop:1}}/> {day.alert}</div>}
        <ul style={{margin:"0 0 8px",paddingLeft:18}}>{(day.actions||[]).map((a,j)=><li key={j} style={{fontSize:13.5,lineHeight:1.55,marginBottom:3}}>{a}</li>)}</ul>
        {day.tip&&<div style={{fontSize:12.5,color:T.sub,fontStyle:"italic"}}>💡 {day.tip}</div>}
      </section>
    ))}
  </>;
}
function dayHeading(ds){
  if(ds===today())return "I dag";
  const y=new Date(); y.setDate(y.getDate()-1);
  if(ds===dateStr(y))return "I går";
  const [Y,M,D]=ds.split("-").map(Number); const dt=new Date(Y,M-1,D);
  return `${WEEKDAYS[dt.getDay()]} ${pad(D)}/${pad(M)}`;
}
function clockTime(ts){ const d=new Date(ts); return `${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function LogView({log,onDelete}){
  const groups=[]; const idx={};
  for(const e of log){ const ds=dateStr(new Date(e.ts)); if(idx[ds]===undefined){ idx[ds]=groups.length; groups.push({ds,items:[]}); } groups[idx[ds]].items.push(e); }
  const [open,setOpen]=useState({[today()]:true});
  const [confirmDel,setConfirmDel]=useState(null);
  const toggle=ds=>setOpen(o=>({...o,[ds]:!o[ds]}));
  const askDelete=id=>{ if(confirmDel===id){ onDelete(id); setConfirmDel(null); } else { setConfirmDel(id); setTimeout(()=>setConfirmDel(c=>c===id?null:c),3000); } };
  return <>
    <SectionTitle icon={History} title="Hvem gjorde hvad"/>
    {groups.length===0?(
      <section style={{...card,textAlign:"center",color:T.sub,fontSize:13.5,padding:28}}>Ingen aktivitet endnu. Sæt flueben på "I dag", så dukker det op her — med initialer, så hele husstanden kan følge med.</section>
    ):(
      <section style={{...card,padding:4}}>
        {groups.map(g=>{ const isOpen=!!open[g.ds]; const n=g.items.length;
          return <div key={g.ds}>
            <button className="pv-btn" onClick={()=>toggle(g.ds)} style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"12px 12px",background:"none",border:"none",borderBottom:`1px solid ${T.line}`,cursor:"pointer",fontFamily:FONT,textAlign:"left"}}>
              <span style={{fontSize:13.5,fontWeight:800,color:T.teal,flex:1}}>{dayHeading(g.ds)}</span>
              <span style={{fontSize:11.5,color:T.sub}}>{n} {n===1?"hændelse":"hændelser"}</span>
              <ChevronDown size={16} color={T.sub} style={{transform:isOpen?"rotate(180deg)":"none",transition:"transform .2s",flexShrink:0}}/>
            </button>
            {isOpen&&g.items.map(e=>(
              <div key={e.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px 10px 16px",borderBottom:`1px solid ${T.line}`}}>
                <div style={{width:32,height:32,borderRadius:10,background:T.aquaSoft,color:T.tealDeep,display:"grid",placeItems:"center",fontSize:12,fontWeight:800,flexShrink:0}}>{e.initials}</div>
                <div style={{flex:1,minWidth:0}}><div style={{fontSize:13.5,fontWeight:600}}>{e.label}</div><div style={{fontSize:11.5,color:T.sub}}>{clockTime(e.ts)}</div></div>
                <button className="pv-btn" onClick={()=>askDelete(e.id)} title="Slet" style={{background:confirmDel===e.id?T.dangerBg:"none",border:"none",cursor:"pointer",color:T.danger,fontSize:confirmDel===e.id?12:18,fontWeight:confirmDel===e.id?700:400,lineHeight:1,padding:confirmDel===e.id?"6px 9px":"4px 8px",borderRadius:8,flexShrink:0,fontFamily:FONT,whiteSpace:"nowrap"}}>{confirmDel===e.id?"Slet?":"×"}</button>
              </div>
            ))}
          </div>;
        })}
      </section>
    )}
  </>;
}

function ChatView({chat,onSend,busy,onClear}){
  const [text,setText]=useState("");
  const endRef=useRef(null);
  useEffect(()=>{ if(endRef.current)endRef.current.scrollIntoView({behavior:"smooth"}); },[chat.length,busy]);
  const send=()=>{ const t=text.trim(); if(!t||busy)return; setText(""); onSend(t); };
  return <>
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <SectionTitle icon={MessageCircle} title="Spørg om poolen"/>
      {chat.length>0&&<button className="pv-btn" onClick={onClear} style={{background:"none",border:"none",color:T.sub,fontSize:12,cursor:"pointer",fontFamily:FONT,marginTop:14}}>Ryd</button>}
    </div>
    <section style={{...card,padding:12,minHeight:220,display:"flex",flexDirection:"column"}}>
      {chat.length===0&&<div style={{color:T.sub,fontSize:13,textAlign:"center",padding:"24px 8px",lineHeight:1.6}}>Spørg om hvad som helst — fx "Det er meget varmt, skal jeg give mere ilt?" eller "Vandet er mælkehvidt, hvad gør jeg?". Jeg kender jeres system, satser, seneste målinger og log.</div>}
      {chat.map((m,i)=>(
        <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",marginBottom:8}}>
          <div style={{maxWidth:"84%",padding:"9px 12px",borderRadius:14,fontSize:13.5,lineHeight:1.5,whiteSpace:"pre-wrap",background:m.role==="user"?T.teal:T.aquaSoft,color:m.role==="user"?"#fff":T.ink}}>
            {m.role==="user"&&m.initials?<div style={{fontSize:10,fontWeight:800,opacity:.85,marginBottom:2}}>{m.initials}</div>:null}
            {m.content}
          </div>
        </div>
      ))}
      {busy&&<div style={{alignSelf:"flex-start",padding:"9px 12px",borderRadius:14,background:T.aquaSoft,color:T.sub,fontSize:13}}>Tænker…</div>}
      <div ref={endRef}/>
    </section>
    <div style={{display:"flex",gap:8,marginTop:10}}>
      <input className="pv-in" value={text} onChange={e=>setText(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter"){ e.preventDefault(); send(); } }} placeholder="Skriv et spørgsmål…" style={{...inStyle,flex:1}}/>
      <button className="pv-btn" onClick={send} disabled={busy} style={{background:T.teal,color:"#fff",border:"none",borderRadius:10,padding:"0 18px",fontWeight:700,fontSize:14,cursor:busy?"default":"pointer",fontFamily:FONT,opacity:busy?0.6:1}}>Send</button>
    </div>
    <p style={{fontSize:11,color:T.sub,margin:"8px 4px 0",lineHeight:1.5}}>Svar er vejledende og via Anthropic. Samtalen deles med hele husstanden.</p>
  </>;
}
function SettingsView({cfg,onSave,onReset,showToast}){ const [f,setF]=useState(cfg); const [advanced,setAdvanced]=useState(false); const [confirmReset,setConfirmReset]=useState(false);
  const [addr,setAddr]=useState(""); const [geoBusy,setGeoBusy]=useState(false); const [geoErr,setGeoErr]=useState(null);
  const set=(k,v)=>setF(s=>({...s,[k]:v})); const setRate=(k,v)=>setF(s=>({...s,rates:{...s.rates,[k]:parseFloat(v)||0}})); const save=()=>{ onSave(f); showToast("Gemt"); };
  const findAddr=async()=>{ const q=addr.trim(); if(!q)return; setGeoBusy(true); setGeoErr(null);
    try{ const r=await fetch(`/api/geocode?q=${encodeURIComponent(q)}`); if(!r.ok)throw 0; const d=await r.json();
      setF(s=>({...s,lat:+(+d.lat).toFixed(5),lng:+(+d.lng).toFixed(5),locationName:(d.name||"").split(",").slice(0,2).join(",").trim()||s.locationName}));
      showToast("Koordinater fundet");
    }catch{ setGeoErr("Kunne ikke finde adressen. Gør den mere præcis (vej, nr., by)."); }
    finally{ setGeoBusy(false); } };
  return <>
    <SectionTitle icon={Settings} title="Indstillinger"/>
    <section style={card}>
      <Field label="Poolstørrelse (liter)"><NumIn value={f.poolSize} onChange={v=>set("poolSize",parseInt(v)||0)}/></Field>
      <Field label="Pumpekapacitet (liter/time)"><NumIn value={f.pumpCap} onChange={v=>set("pumpCap",parseInt(v)||0)}/></Field>
      <Field label="Find via adresse">
        <div style={{display:"flex",gap:8}}>
          <input className="pv-in" value={addr} onChange={e=>setAddr(e.target.value)} onKeyDown={e=>{ if(e.key==="Enter"){ e.preventDefault(); findAddr(); } }} placeholder="Fx Vestergade 12, 5000 Odense" style={{...inStyle,flex:1}}/>
          <button className="pv-btn" onClick={findAddr} disabled={geoBusy} style={{background:T.teal,color:"#fff",border:"none",borderRadius:10,padding:"0 16px",fontWeight:700,fontSize:14,cursor:geoBusy?"default":"pointer",fontFamily:FONT,whiteSpace:"nowrap",opacity:geoBusy?0.6:1}}>{geoBusy?"Søger…":"Find"}</button>
        </div>
      </Field>
      {geoErr&&<p style={{fontSize:12,color:T.danger,margin:"-6px 2px 8px",lineHeight:1.45}}>{geoErr}</p>}
      <p style={{fontSize:11.5,color:T.sub,margin:"-4px 2px 12px",lineHeight:1.5}}>Indtast din adresse og tryk Find — så udfyldes lokation og koordinater automatisk. Du kan også rette dem manuelt herunder.</p>
      <Field label="Lokation (navn)"><TxtIn value={f.locationName} onChange={v=>set("locationName",v)}/></Field>
      <div style={{display:"flex",gap:10}}>
        <Field label="Breddegrad"><NumIn value={f.lat} step="0.0001" onChange={v=>set("lat",parseFloat(v)||0)}/></Field>
        <Field label="Længdegrad"><NumIn value={f.lng} step="0.0001" onChange={v=>set("lng",parseFloat(v)||0)}/></Field>
      </div>
      <Field label="System">
        <PillRow options={[["oxygen","Aktiv ilt"],["chlorine","Klor"]]} value={f.system||"oxygen"} onChange={v=>set("system",v)}/>
      </Field>
      {f.system!=="chlorine" && <Field label="Desinfektionsform">
        <PillRow options={[["oxychock","OxyChock granulat"],["combitabs","CombiTabs"]]} value={f.oxygenForm||"oxychock"} onChange={v=>set("oxygenForm",v)}/>
      </Field>}
      {f.system==="chlorine" && <p style={{fontSize:11.5,color:T.sub,margin:"-4px 2px 12px",lineHeight:1.5}}>Klor-doseringer tilføjes når guiderne er lagt ind. pH, klar pool, flokning og målinger virker allerede.</p>}
      <Field label="Filtertype">
        <PillRow options={[["sand","Sand"],["glass","Glas"],["cartridge","Patron"],["balls","FilterBalls"]]} value={f.filterType||"sand"} onChange={v=>set("filterType",v)}/>
      </Field>
      <label style={{display:"flex",alignItems:"center",gap:10,padding:"10px 2px",cursor:"pointer"}}>
        <input type="checkbox" checked={f.useWaterfall} onChange={e=>set("useWaterfall",e.target.checked)} style={{width:18,height:18,accentColor:T.teal}}/>
        <span style={{fontSize:14,fontWeight:600}}>Jeg bruger vandfald / dykpumpe</span>
      </label>
      <label style={{display:"flex",alignItems:"center",gap:10,padding:"10px 2px",cursor:"pointer",borderTop:`1px solid ${T.line}`}}>
        <input type="checkbox" checked={!!f.uvLamp} onChange={e=>set("uvLamp",e.target.checked)} style={{width:18,height:18,accentColor:T.teal}}/>
        <span style={{fontSize:14,fontWeight:600}}>Jeg har UV-filterlys</span>
      </label>
      <label style={{display:"flex",alignItems:"center",gap:10,padding:"10px 2px",cursor:"pointer",borderTop:`1px solid ${T.line}`}}>
        <input type="checkbox" checked={f.autoPlan!==false} onChange={e=>set("autoPlan",e.target.checked)} style={{width:18,height:18,accentColor:T.teal}}/>
        <span style={{fontSize:14,fontWeight:600}}>Generér plan automatisk hver morgen</span>
      </label>
    </section>

    <button className="pv-btn" onClick={()=>setAdvanced(a=>!a)} style={{...card,width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",fontFamily:FONT,fontSize:13.5,fontWeight:600,color:T.ink,marginTop:12}}>
      Avanceret: doseringssatser (pr. 10.000 L)<ChevronDown size={18} style={{transform:advanced?"rotate(180deg)":"none",transition:"transform .2s"}}/>
    </button>
    {advanced&&<section style={{...card,marginTop:8}}>
      <Field label="OxyChock g / 3 dage"><NumIn value={f.rates.oxyPer10k} onChange={v=>setRate("oxyPer10k",v)}/></Field>
      <Field label="OxyChock g / dag (alt.)"><NumIn value={f.rates.oxyDailyPer10k} onChange={v=>setRate("oxyDailyPer10k",v)}/></Field>
      <Field label="Aktivator ml / 3 dage"><NumIn value={f.rates.aktPer10k} onChange={v=>setRate("aktPer10k",v)}/></Field>
      <Field label="KlarPool ml / uge"><NumIn value={f.rates.klarWeeklyPer10k} onChange={v=>setRate("klarWeeklyPer10k",v)}/></Field>
      <Field label="pH-Minus g / 0,2 fald"><NumIn value={f.rates.phMinusPer10k} onChange={v=>setRate("phMinusPer10k",v)}/></Field>
      <Field label="pH-Plus g / 0,2 stigning"><NumIn value={f.rates.phPlusPer10k} onChange={v=>setRate("phPlusPer10k",v)}/></Field>
      <Field label="SeaKlear ml / 2.000 L (uge)"><NumIn value={f.rates.seaklearMlPer2000} onChange={v=>setRate("seaklearMlPer2000",v)}/></Field>
      <p style={{fontSize:11.5,color:T.sub,margin:"6px 2px 0",lineHeight:1.5}}>Standardtallene følger Swim & Funs vejledning (pr. 10.000 L, undtagen SeaKlear pr. 2.000 L). Justér kun hvis din etikette siger noget andet.</p>
    </section>}

    <button className="pv-btn" onClick={save} style={{width:"100%",background:T.teal,color:"#fff",border:"none",borderRadius:12,padding:"13px",fontWeight:800,fontSize:15,cursor:"pointer",marginTop:14,fontFamily:FONT}}>Gem indstillinger</button>
    <button className="pv-btn" onClick={()=>{ if(confirmReset){ onReset(); setConfirmReset(false); showToast("Nulstillet"); } else { setConfirmReset(true); setTimeout(()=>setConfirmReset(false),4000); } }} style={{width:"100%",background:confirmReset?T.danger:"none",color:confirmReset?"#fff":T.danger,border:`1.5px solid ${confirmReset?T.danger:T.dangerBg}`,borderRadius:12,padding:"11px",fontWeight:600,fontSize:13.5,cursor:"pointer",marginTop:10,fontFamily:FONT}}>{confirmReset?"Tryk igen for at nulstille log & plan":"Nulstil log & plan"}</button>
  </>;
}
const Field=({label,children})=><div style={{marginBottom:12,flex:1}}><div style={{fontSize:12,fontWeight:600,color:T.sub,marginBottom:5}}>{label}</div>{children}</div>;
const PillRow=({options,value,onChange})=>(
  <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
    {options.map(([v,l])=>(
      <button key={v} type="button" className="pv-btn" onClick={()=>onChange(v)}
        style={{border:`1.5px solid ${value===v?T.teal:T.line}`,background:value===v?T.teal:"#fff",color:value===v?"#fff":T.ink,borderRadius:999,padding:"8px 14px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:FONT}}>{l}</button>
    ))}
  </div>
);
const NumIn=({value,onChange,step})=><input className="pv-in" type="number" value={value} step={step} onChange={e=>onChange(e.target.value)} style={inStyle}/>;
const TxtIn=({value,onChange})=><input className="pv-in" value={value} onChange={e=>onChange(e.target.value)} style={inStyle}/>;

function timeAgo(ts){ if(!ts)return""; const s=Math.floor((Date.now()-ts)/1000); if(s<60)return"lige nu"; if(s<3600)return`${Math.floor(s/60)} min siden`; if(s<86400)return`${Math.floor(s/3600)} t siden`; return`${Math.floor(s/86400)} d siden`; }
function fullTime(ts){ const d=new Date(ts); const t=`${pad(d.getHours())}:${pad(d.getMinutes())}`; return dateStr(d)===today()?`I dag ${t}`:`${WEEKDAYS[d.getDay()]} ${pad(d.getDate())}/${pad(d.getMonth()+1)} · ${t}`; }

const card={background:T.surface,borderRadius:16,padding:14,marginTop:12,border:`1px solid ${T.line}`,boxShadow:"0 1px 2px rgba(10,46,51,.04)"};
const eyebrow={fontSize:11,fontWeight:800,letterSpacing:1.2,textTransform:"uppercase"};
const chip={border:"1.5px solid",borderRadius:999,padding:"8px 13px",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:FONT};
const miniPill={border:"none",borderRadius:999,padding:"5px 11px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:FONT};
const badge={background:T.aqua,color:T.ink,fontSize:10.5,fontWeight:800,padding:"2px 7px",borderRadius:999,letterSpacing:.3};
const inStyle={width:"100%",boxSizing:"border-box",padding:"10px 11px",border:`1.5px solid ${T.line}`,borderRadius:10,fontSize:14.5,fontFamily:FONT,background:"#fff",color:T.ink};
const navBar={position:"fixed",bottom:0,left:0,right:0,background:"rgba(255,255,255,.92)",backdropFilter:"blur(10px)",borderTop:`1px solid ${T.line}`,display:"flex",justifyContent:"space-around",padding:"8px 0 10px",zIndex:40};
const navItem={background:"none",border:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer",padding:"4px 9px",fontFamily:FONT};

ReactDOM.createRoot(document.getElementById("root")).render(<Poolvagten/>);
</script>
</body>
</html>
